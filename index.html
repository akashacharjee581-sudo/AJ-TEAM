<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Terminated</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #05050a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 40px 20px;
        }

        /* গ্লিচ বা ডেঞ্জার লুকের জন্য বড় ক্রস আইকন */
        .error-graphic {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: rgba(239, 68, 68, 0.05);
            border: 2px solid #ef4444;
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.2);
        }

        .error-graphic svg {
            width: 50px;
            height: 50px;
            fill: #ef4444;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 15px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .status-badge {
            display: inline-block;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 25px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        p {
            color: #94a3b8;
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 35px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #334155, transparent);
            margin-bottom: 35px;
        }

        .btn-exit {
            display: inline-block;
            background: #1e293b;
            color: #94a3b8;
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid #334155;
            transition: all 0.2s ease;
        }

        .btn-exit:hover {
            background: #ef4444;
            color: #ffffff;
            border-color: #ef4444;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.25);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- টোটাল ব্যানের ক্রস আইকন -->
        <div class="error-graphic">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
        </div>

        <!-- মেইন মেসেজ -->
        <h1>Account Deleted</h1>
        <div class="status-badge">Totally Banned</div>
        
        <p>আপনার এই অ্যাকাউন্টটি সিস্টেম থেকে সম্পূর্ণভাবে বাতিল ও ব্যান করা হয়েছে। এই আইডির সমস্ত ডাটাবেজ ডিলিট করে দেওয়া হয়েছে, যার ফলে এটি আর কোনোভাবেই রিকভার বা লগইন করা সম্ভব নয়।</p>

        <div class="divider"></div>

        <!-- হোম বা এক্সিট বাটন -->
        <a href="#homepage-link" class="btn-exit">Back to Homepage</a>
    </div>

</body>
</html>
