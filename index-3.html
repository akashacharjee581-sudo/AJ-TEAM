<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AJ TEAM VIP H4CK</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: -webkit-fill-available; }
        body {
            width: 100vw; height: 100vh; height: 100dvh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            position: fixed; top: 0; left: 0;
        }

        /* ── MATRIX CANVAS ── */
        #matrixCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; opacity: 0.13;
            pointer-events: none;
        }

        /* ── SCANLINE OVERLAY ── */
        body::after {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,255,65,0.012) 2px, rgba(0,255,65,0.012) 4px
            );
            pointer-events: none; z-index: 0;
        }

        /* ── IFRAMES ── */
        .game-frame {
            width: 100%; height: 100%; border: none;
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            visibility: hidden; opacity: 0; transition: opacity 0.3s ease;
        }
        .game-frame.active-frame { visibility: visible; opacity: 1; z-index: 1; }

        /* ── RED ALERT ── */
        #red-alert {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(255,0,0,0.85);
            z-index: 999999; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff; font-family: 'Orbitron', sans-serif; text-align: center;
            animation: redFlash 0.1s infinite alternate;
            pointer-events: none;
        }
        @keyframes redFlash {
            0%   { background: rgba(255,0,0,0.9); }
            100% { background: rgba(100,0,0,0.9); }
        }
        .glitch-text {
            font-size: 32px; font-weight: 900; color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 30px #f00;
            animation: glitchAnim 0.1s infinite;
            letter-spacing: 2px; margin-bottom: 16px;
        }
        @keyframes glitchAnim {
            0%   { transform: translate(0); }
            25%  { transform: translate(-4px, 4px); }
            50%  { transform: translate(4px, -4px); }
            75%  { transform: translate(-4px, -4px); }
            100% { transform: translate(0); }
        }
        .timer-red { font-size: 22px; color: #fff; font-weight: 900; }

        /* ── PET BOT ── */
        #pet-bot {
            position: absolute; width: 30px; height: 25px;
            z-index: 10001; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.68,-0.55,0.27,1.55);
        }
        .bot-body {
            position: relative; width: 18px; height: 18px;
            background: linear-gradient(135deg, #a855f7, #7c00ff);
            margin: 0 auto; border-radius: 4px; border: 2px solid #e0aaff;
            box-shadow: 0 0 12px #a855f7, 0 0 25px rgba(168,85,247,0.4);
            display: flex; justify-content: center; align-items: center;
        }
        .bot-body::before { content: ""; position: absolute; width: 10px; height: 3px; background: #000; border-radius: 2px; top: 4px; }
        .eye-glow { position: absolute; width: 2px; height: 2px; background: #ffd700; border-radius: 50%; top: 5px; left: 3px; box-shadow: 0 0 5px #ffd700; animation: blink 2s infinite; }
        .eye-glow.right { left: 9px; }
        .wing { position: absolute; width: 14px; height: 8px; background: rgba(168,85,247,0.7); top: 3px; border: 1px solid #e0aaff; border-radius: 12px 12px 0 12px; }
        .wing.left  { left: -11px; transform-origin: right; animation: flapL 0.15s infinite alternate; }
        .wing.right { right: -11px; transform-origin: left; border-radius: 12px 12px 12px 0; animation: flapR 0.15s infinite alternate; }
        @keyframes flapL { from { transform: rotate(0deg); } to { transform: rotate(45deg); } }
        @keyframes flapR { from { transform: rotate(0deg); } to { transform: rotate(-45deg); } }
        @keyframes blink  { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
        .flying-mode { animation: orbit 6s linear infinite; }
        @keyframes orbit { 0% { top:-20px;left:-20px; } 25% { top:-20px;left:100%; } 50% { top:100%;left:100%; } 75% { top:100%;left:-20px; } 100% { top:-20px;left:-20px; } }
        .sitting-mode { top:-25px!important; left:50%!important; transform:translateX(-50%); animation:hover 2s ease-in-out infinite; }
        @keyframes hover { 0%,100% { margin-top:0; } 50% { margin-top:-3px; } }
        .bot-pulse { animation: botPulse 0.5s ease; }
        @keyframes botPulse { 0% { transform:translateX(-50%) scale(1); } 50% { transform:translateX(-50%) scale(1.3); filter:hue-rotate(60deg); } 100% { transform:translateX(-50%) scale(1); } }

        /* ── OVERLAY WRAPPER ── */
        #overlay-wrapper {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            z-index: 1000; width: 200px; touch-action: none;
        }

        /* ── ULTRA HACKER BORDER ── */
        .rgb-border-wrap {
            padding: 2px; border-radius: 14px;
            background: linear-gradient(45deg,
                #7c00ff, #a855f7, #ff00c8,
                #ffd700, #a855f7, #7c00ff,
                #ff00c8, #a855f7, #7c00ff
            );
            background-size: 400%;
            animation: borderSpin 8s linear infinite;
            box-shadow:
                0 0 20px rgba(168,85,247,0.7),
                0 0 40px rgba(168,85,247,0.3),
                0 0 60px rgba(124,0,255,0.2);
        }
        @keyframes borderSpin {
            0%   { background-position: 0 0; }
            50%  { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        /* ── INNER BOX ── */
        #overlay-box {
            position: relative; width: 100%; min-height: 160px;
            background: linear-gradient(160deg, rgba(8,0,20,0.98), rgba(0,0,0,0.99));
            border-radius: 12px; padding: 10px;
            cursor: grab; user-select: none;
            overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* dot grid */
        #overlay-box::after {
            content: ""; position: absolute; top:0; left:0; width:100%; height:100%;
            background-image: radial-gradient(rgba(168,85,247,0.12) 1px, transparent 1px);
            background-size: 10px 10px; opacity: 0.6; z-index: 0; pointer-events: none;
        }

        /* ── SCANLINE IN BOX ── */
        .scanline {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, #a855f7, #ffd700, #a855f7, transparent);
            animation: scan 2s linear infinite; z-index: 2; opacity: 0.8;
        }
        @keyframes scan { 0% { top:-5%; } 100% { top:110%; } }

        /* ── CORNER BRACKETS ── */
        .corner { position: absolute; width: 10px; height: 10px; z-index: 3; }
        .corner.tl { top:4px; left:4px; border-top:2px solid #a855f7; border-left:2px solid #a855f7; }
        .corner.tr { top:4px; right:4px; border-top:2px solid #a855f7; border-right:2px solid #a855f7; }
        .corner.bl { bottom:4px; left:4px; border-bottom:2px solid #a855f7; border-left:2px solid #a855f7; }
        .corner.br { bottom:4px; right:4px; border-bottom:2px solid #a855f7; border-right:2px solid #a855f7; }

        /* ── TITLE ── */
        .title-main {
            text-align: center; font-family: 'Orbitron', sans-serif;
            font-size: 10.5px; font-weight: 900; color: #ffd700;
            text-transform: uppercase; letter-spacing: 1.5px;
            text-shadow: 0 0 8px #ffd700, 0 0 20px rgba(255,215,0,0.5), 0 0 35px rgba(168,85,247,0.4);
            position: relative; z-index: 1;
            border-bottom: 1px solid rgba(168,85,247,0.4);
            padding-bottom: 4px; margin-bottom: 2px;
            animation: titleGlitch 5s infinite;
        }
        @keyframes titleGlitch {
            0%,95%,100% { text-shadow: 0 0 8px #ffd700, 0 0 20px rgba(255,215,0,0.5); }
            96% { text-shadow: -2px 0 #ff00c8, 2px 0 #ffd700; transform: translateX(-1px); }
            97% { text-shadow: 2px 0 #7c00ff, -2px 0 #ffd700; transform: translateX(1px); }
            98% { text-shadow: 0 0 8px #ffd700; transform: translateX(0); }
        }
        .title-sub {
            text-align: center; font-size: 7.5px; font-weight: 700;
            color: #a855f7; letter-spacing: 2px;
            margin: 3px 0 7px; position: relative; z-index: 1;
            text-shadow: 0 0 6px rgba(168,85,247,0.6);
        }

        /* ── SERVER BUTTONS ── */
        .server-row { display: flex; gap: 5px; margin-bottom: 8px; position: relative; z-index: 2; }
        .btn-server {
            flex: 1; background: rgba(168,85,247,0.08);
            border: 1px solid rgba(168,85,247,0.5);
            border-radius: 4px; color: #a855f7;
            font-size: 7.5px; font-weight: bold; padding: 5px;
            cursor: pointer; font-family: 'Orbitron', sans-serif; transition: 0.3s;
            letter-spacing: 0.5px;
        }
        .btn-server.active {
            background: linear-gradient(90deg, rgba(168,85,247,0.3), rgba(124,0,255,0.4));
            color: #ffd700; border-color: #a855f7;
            box-shadow: 0 0 10px rgba(168,85,247,0.5), inset 0 0 8px rgba(168,85,247,0.1);
        }

        /* ── LOGIN ── */
        #login-screen {
            display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 1; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }

        .password-input {
            width: 100%; background: rgba(0,0,0,0.8);
            border: 1px solid rgba(168,85,247,0.6);
            border-radius: 5px; padding: 8px;
            color: #a855f7; font-size: 10px; outline: none;
            margin-bottom: 7px; text-align: center;
            font-family: 'Orbitron', sans-serif; transition: 0.3s;
            letter-spacing: 2px;
            box-shadow: inset 0 0 8px rgba(168,85,247,0.1);
        }
        .password-input::placeholder { color: rgba(168,85,247,0.4); font-size: 8px; }
        .password-input:focus {
            box-shadow: 0 0 12px rgba(168,85,247,0.6), inset 0 0 8px rgba(168,85,247,0.1);
            border-color: #ffd700; color: #ffd700;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(90deg, #7c00ff, #a855f7, #7c00ff);
            background-size: 200%;
            color: #fff; font-weight: 900; font-size: 9.5px;
            text-transform: uppercase; border: none; border-radius: 5px;
            padding: 7px; cursor: pointer;
            box-shadow: 0 0 15px rgba(168,85,247,0.6);
            font-family: 'Orbitron', sans-serif; margin-bottom: 7px;
            transition: 0.2s; letter-spacing: 1px;
            animation: btnPulse 2s infinite;
        }
        @keyframes btnPulse {
            0%,100% { box-shadow: 0 0 12px rgba(168,85,247,0.5); background-position: 0%; }
            50%      { box-shadow: 0 0 22px rgba(168,85,247,0.9); background-position: 100%; }
        }
        .btn-login:active { transform: scale(0.96); }

        .error-msg { display:none; color:#ff003c; font-size:9px; margin-bottom:7px; font-weight:bold; text-shadow:0 0 5px #ff003c; text-align:center; }

        .btn-telegram {
            width: 100%; background: transparent;
            border: 1px dashed rgba(255,215,0,0.6);
            color: #ffd700; font-size: 8.5px; font-weight: bold;
            font-family: 'Share Tech Mono', monospace;
            padding: 6px; border-radius: 5px; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            gap: 5px; transition: 0.3s; animation: tgPulse 2s infinite; margin-top: 1px;
        }
        .btn-telegram i { font-size: 11px; }
        .btn-telegram:active { background: rgba(255,215,0,0.08); }
        @keyframes tgPulse {
            0%,100% { box-shadow: 0 0 0 transparent; }
            50%      { box-shadow: 0 0 10px rgba(255,215,0,0.4); }
        }

        /* ── PREDICTION ── */
        #pred-section { display:none; position:relative; z-index:1; animation:fadeIn 0.5s ease; }

        .info-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(168,85,247,0.07);
            padding: 4px 7px; border-radius: 4px;
            border: 1px solid rgba(168,85,247,0.35);
            margin-bottom: 8px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.5), 0 0 6px rgba(168,85,247,0.1);
        }
        .period-text {
            font-size: 9.5px; color: #e0aaff;
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            text-shadow: 0 0 5px rgba(224,170,255,0.5);
        }
        .timer-text {
            font-size: 11px; font-weight: 900; color: #a855f7;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px #a855f7, 0 0 20px rgba(168,85,247,0.5);
        }

        /* ── PREDICTION BOX ── */
        .prediction-box {
            text-align: center; margin-bottom: 8px; padding: 10px 5px;
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
            border: 1px solid rgba(168,85,247,0.25);
            box-shadow:
                inset 0 0 15px rgba(168,85,247,0.05),
                0 0 10px rgba(168,85,247,0.1);
            position: relative; overflow: hidden;
        }
        /* inner glow sweep */
        .prediction-box::before {
            content: '';
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(168,85,247,0.06) 0%, transparent 60%);
            animation: glowSweep 4s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes glowSweep {
            0%,100% { opacity: 0.5; transform: scale(0.8); }
            50%      { opacity: 1;   transform: scale(1.1); }
        }

        .pred-value {
            font-family: 'Orbitron', sans-serif; font-weight: 900;
            font-size: 28px; letter-spacing: 2px; display: block;
            margin-bottom: 3px; transition: 0.3s;
            animation: predPulse 1.5s infinite;
            text-transform: uppercase; position: relative; z-index: 1;
        }
        @keyframes predPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }
        .pred-small {
            color: #a855f7;
            text-shadow: 0 0 15px rgba(168,85,247,0.9), 0 0 30px rgba(168,85,247,0.5), 0 0 50px rgba(168,85,247,0.2);
        }
        .pred-big {
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255,215,0,0.9), 0 0 30px rgba(255,215,0,0.5), 0 0 50px rgba(255,215,0,0.2);
        }

        .lvl-badge {
            background: rgba(168,85,247,0.12);
            border: 1px solid rgba(168,85,247,0.5);
            padding: 2px 8px; border-radius: 20px;
            font-weight: bold; margin-top: 5px; font-size: 7.5px;
            color: #e0aaff; display: inline-block;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 6px rgba(168,85,247,0.3);
            letter-spacing: 0.5px;
        }

        .opp-label {
            font-size: 7px; color: rgba(255,215,0,0.7);
            margin-top: 5px; font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .num-row { display: flex; justify-content: center; gap: 14px; margin-top: 5px; }
        .num-circle {
            width: 28px; height: 28px; line-height: 26px;
            border: 2px solid #ffd700; border-radius: 50%;
            font-weight: 900; background: rgba(0,0,0,0.8);
            color: #ffd700; font-size: 13px;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 10px rgba(255,215,0,0.6), inset 0 0 6px rgba(255,215,0,0.1);
            animation: numPulse 2s infinite;
        }
        @keyframes numPulse {
            0%,100% { box-shadow: 0 0 10px rgba(255,215,0,0.6); }
            50%      { box-shadow: 0 0 20px rgba(255,215,0,0.9), 0 0 35px rgba(255,215,0,0.3); }
        }

        /* ── STREAK ── */
        .streak-box {
            display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(168,85,247,0.2);
            border-radius: 5px; padding: 5px 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 8.5px; font-weight: bold;
            position: relative;
        }
        .streak-box::after {
            content: ""; position: absolute; bottom: -1px; left: 10%; width: 80%; height: 1px;
            background: linear-gradient(90deg, transparent, #a855f7, transparent);
        }
        .s-sig  { color: #888; }
        .s-win  { color: #39ff14; text-shadow: 0 0 6px #39ff14; }
        .s-loss { color: #ff003c; text-shadow: 0 0 6px #ff003c; }

        .anim-update { animation: flashUp 0.5s ease; }
        @keyframes flashUp {
            0%   { transform:scale(1); filter:brightness(1); }
            50%  { transform:scale(1.05); filter:brightness(1.6); }
            100% { transform:scale(1); filter:brightness(1); }
        }
    </style>
</head>

<script>
    // ── MATRIX RAIN ──
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    let drops = [];
    function initMatrix() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drops = Array(Math.floor(canvas.width / 16)).fill(1);
    }
    function drawMatrix() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#a855f7';
        ctx.font = '13px Share Tech Mono';
        drops.forEach((y, i) => {
            const ch = String.fromCharCode(0x30A0 + Math.random() * 96);
            ctx.fillText(ch, i * 16, y * 16);
            if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    initMatrix();
    setInterval(drawMatrix, 55);
    window.addEventListener('resize', initMatrix);

    // ── GAME SWITCH ──
    function switchGame(frameId, btn) {
        document.querySelectorAll('.game-frame').forEach(f => f.classList.remove('active-frame'));
        document.getElementById(frameId).classList.add('active-frame');
        document.querySelectorAll('.btn-server').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // ── TOUCH SOUND ──
    function playTringSound() {
        const a = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        a.volume = 0.4;
        a.play().catch(() => {});
    }
    document.addEventListener('pointerdown', playTringSound);

    const emergencySiren = new Audio('https://assets.mixkit.co/active_storage/sfx/1640/1640-preview.mp3');
    emergencySiren.loop = true;

    const bot = document.getElementById('pet-bot');

    boxDrag.addEventListener('mousedown', startDragging);
    boxDrag.addEventListener('touchstart', startDragging, { passive: false });

    function startDragging(e) {
        if (['INPUT','BUTTON','A','I','LABEL','SPAN'].includes(e.target.tagName)) return;
        if (e.type === 'touchstart') e.preventDefault();
        isDragging = true;
        const r = dragEl.getBoundingClientRect();
        dragEl.style.transform = 'none';
        dragEl.style.left = r.left + 'px';
        dragEl.style.top  = r.top  + 'px';
        startL = r.left; startT = r.top;
        startX = e.type==='touchstart'?e.touches[0].clientX:e.clientX;
        startY = e.type==='touchstart'?e.touches[0].clientY:e.clientY;
        document.addEventListener('mousemove', moveDragging);
        document.addEventListener('touchmove', moveDragging, { passive: false });
        document.addEventListener('mouseup',   stopDragging);
        document.addEventListener('touchend',  stopDragging);
    }
    function moveDragging(ev) {
        if (!isDragging) return;
        ev.preventDefault();
        const cx = ev.type==='touchmove'?ev.touches[0].clientX:ev.clientX;
        const cy = ev.type==='touchmove'?ev.touches[0].clientY:ev.clientY;
        dragEl.style.left = (startL + cx - startX) + 'px';
        dragEl.style.top  = (startT + cy - startY) + 'px';
    }
    function stopDragging() {
        isDragging = false;
        document.removeEventListener('mousemove', moveDragging);
        document.removeEventListener('touchmove', moveDragging);
    }
</script>
</body>
</html>
